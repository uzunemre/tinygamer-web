<!DOCTYPE html>
<html>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <style>
        body { margin:0; padding:0; overflow:hidden; width:100vw; height:100vh; touch-action:none; user-select:none; -webkit-user-select:none; background:#1a1a2e; }
        canvas { display:block; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initPositions();
    });

    // Audio
    let audioCtx = null;
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    function playSound(freq, type, duration, vol) {
        if (!audioCtx) return;
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = type || 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(freq * 0.5, audioCtx.currentTime + duration);
        gain.gain.setValueAtTime(vol || 0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + duration);
    }

    // Game states
    const STATE = { MENU: 0, PLAYING: 1, GAME_OVER: 2 };
    let state = STATE.MENU;

    // Game constants
    let W = canvas.width;
    let H = canvas.height;
    const GRAVITY = 0.5;
    const GROUND_H = 80;

    // Player
    let player = {
        x: 0, y: 0, w: 50, h: 60,
        vx: 0, vy: 0,
        onGround: false,
        facing: 1,
        jumpCount: 0,
        maxJumps: 1,
        headBouncing: false,
        headBounceTimer: 0
    };

    // Opponent
    let opponent = {
        x: 0, y: 0, w: 50, h: 60,
        vx: 0, vy: 0,
        onGround: false,
        facing: -1,
        jumpCount: 0,
        maxJumps: 1,
        headBouncing: false,
        headBounceTimer: 0,
        score: 0
    };

    // Ball
    let ball = {
        x: 0, y: 0, r: 20,
        vx: 4, vy: -3
    };

    // Scores
    let playerScore = 0;
    let opponentScore = 0;
    let highScore = parseInt(localStorage.getItem('kafatopu_hs') || '0');

    // Net
    let net = { x: 0, w: 12, h: 0 };

    // Input
    let keys = { left: false, right: false, up: false };
    let touchLeft = false, touchRight = false;
    let leftBtn = { x:0, y:0, w:0, h:0 };
    let rightBtn = { x:0, y:0, w:0, h:0 };
    let jumpBtn = { x:0, y:0, w:0, h:0 };

    function initPositions() {
        W = canvas.width;
        H = canvas.height;

        net.x = W / 2;
        net.h = H * 0.18;

        const groundY = H - GROUND_H;

        player.x = W * 0.2;
        player.y = groundY - player.h;
        player.vx = 0; player.vy = 0;
        player.onGround = true;
        player.jumpCount = 0;

        opponent.x = W * 0.8;
        opponent.y = groundY - opponent.h;
        opponent.vx = 0; opponent.vy = 0;
        opponent.onGround = true;
        opponent.jumpCount = 0;

        ball.x = W * 0.25;
        ball.y = H * 0.4;
        ball.vx = 4;
        ball.vy = -2;

        // Buttons
        const bh = 70;
        const bw = 90;
        leftBtn = { x: 10, y: H - bh - 10, w: bw, h: bh };
        rightBtn = { x: 110, y: H - bh - 10, w: bw, h: bh };
        jumpBtn = { x: W - bw - 10, y: H - bh - 10, w: bw, h: bh };
    }

    initPositions();

    function resetBall(side) {
        ball.x = side === 'left' ? W * 0.25 : W * 0.75;
        ball.y = H * 0.35;
        ball.vx = side === 'left' ? 3 : -3;
        ball.vy = -5;
    }

    function resetPlayers() {
        const groundY = H - GROUND_H;
        player.x = W * 0.2;
        player.y = groundY - player.h;
        player.vx = 0; player.vy = 0;
        player.onGround = true; player.jumpCount = 0;

        opponent.x = W * 0.8;
        opponent.y = groundY - opponent.h;
        opponent.vx = 0; opponent.vy = 0;
        opponent.onGround = true; opponent.jumpCount = 0;
    }

    // AI for opponent
    function updateOpponentAI() {
        const groundY = H - GROUND_H;
        const speed = 3.5;

        // Move toward ball if on opponent's side
        let targetX = ball.x - opponent.w / 2;

        // Defensive positioning
        if (ball.x > net.x) {
            // Ball is on opponent's side - chase it
            if (opponent.x + opponent.w/2 < ball.x - 20) {
                opponent.vx = speed;
                opponent.facing = 1;
            } else if (opponent.x + opponent.w/2 > ball.x + 20) {
                opponent.vx = -speed;
                opponent.facing = -1;
            } else {
                opponent.vx = 0;
            }

            // Jump if ball is reachable
            if (opponent.onGround && ball.y < groundY - 80 && Math.abs(opponent.x + opponent.w/2 - ball.x) < 120) {
                opponent.vy = -13;
                opponent.onGround = false;
                opponent.jumpCount = 1;
            }
        } else {
            // Ball is on player's side, go to center-right
            let defX = W * 0.72;
            if (opponent.x + opponent.w/2 < defX - 10) {
                opponent.vx = speed * 0.5;
            } else if (opponent.x + opponent.w/2 > defX + 10) {
                opponent.vx = -speed * 0.5;
            } else {
                opponent.vx = 0;
            }
        }

        // Keep opponent on their side
        if (opponent.x < net.x + net.w/2 + 5) {
            opponent.x = net.x + net.w/2 + 5;
            opponent.vx = 0;
        }
        if (opponent.x + opponent.w > W) {
            opponent.x = W - opponent.w;
            opponent.vx = 0;
        }
    }

    function circleRect(cx, cy, cr, rx, ry, rw, rh) {
        let nearX = Math.max(rx, Math.min(cx, rx + rw));
        let nearY = Math.max(ry, Math.min(cy, ry + rh));
        let dx = cx - nearX;
        let dy = cy - nearY;
        return dx*dx + dy*dy < cr*cr;
    }

    function update() {
        if (state !== STATE.PLAYING) return;

        W = canvas.width;
        H = canvas.height;
        const groundY = H - GROUND_H;

        // Player input
        let px = 0;
        if (keys.left || touchLeft) { px = -1; player.facing = -1; }
        if (keys.right || touchRight) { px = 1; player.facing = 1; }
        player.vx = px * 4.5;

        // Physics - player
        player.vy += GRAVITY;
        player.x += player.vx;
        player.y += player.vy;

        // Ground collision player
        if (player.y + player.h >= groundY) {
            player.y = groundY - player.h;
            player.vy = 0;
            player.onGround = true;
            player.jumpCount = 0;
        } else {
            player.onGround = false;
        }

        // Wall collision player
        if (player.x < 0) player.x = 0;
        if (player.x + player.w > net.x - net.w/2) {
            player.x = net.x - net.w/2 - player.w;
        }

        // AI
        updateOpponentAI();

        // Physics - opponent
        opponent.vy += GRAVITY;
        opponent.x += opponent.vx;
        opponent.y += opponent.vy;

        if (opponent.y + opponent.h >= groundY) {
            opponent.y = groundY - opponent.h;
            opponent.vy = 0;
            opponent.onGround = true;
            opponent.jumpCount = 0;
        }
        if (opponent.x < net.x + net.w/2) opponent.x = net.x + net.w/2;
        if (opponent.x + opponent.w > W) opponent.x = W - opponent.w;

        // Ball physics
        ball.vy += GRAVITY * 0.7;
        ball.x += ball.vx;
        ball.y += ball.vy;

        // Ball bounce off walls
        if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx = Math.abs(ball.vx); }
        if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx); }
        if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy = Math.abs(ball.vy); }

        // Ball hit net
        const netLeft = net.x - net.w/2;
        const netRight = net.x + net.w/2;
        const netTop = groundY - net.h;
        if (ball.x + ball.r > netLeft && ball.x - ball.r < netRight && ball.y + ball.r > netTop) {
            if (ball.x < net.x) {
                ball.x = netLeft - ball.r;
                ball.vx = -Math.abs(ball.vx) * 0.7;
            } else {
                ball.x = netRight + ball.r;
                ball.vx = Math.abs(ball.vx) * 0.7;
            }
            ball.vy *= 0.8;
            playSound(200, 'square', 0.1, 0.2);
        }

        // Ball hit ground -> score
        if (ball.y + ball.r >= groundY) {
            playSound(100, 'sawtooth', 0.3, 0.4);
            if (ball.x < net.x) {
                // Ball landed on player side -> opponent scores
                opponentScore++;
                if (opponentScore > highScore) {
                    highScore = opponentScore;
                    // Don't save yet, save on game over
                }
                resetBall('right');
                resetPlayers();
                if (opponentScore >= 7) {
                    state = STATE.GAME_OVER;
                    localStorage.setItem('kafatopu_hs', Math.max(playerScore, parseInt(localStorage.getItem('kafatopu_hs') || '0')));
                }
            } else {
                // Ball landed on opponent side -> player scores
                playerScore++;
                resetBall('left');
                resetPlayers();
                if (playerScore >= 7) {
                    state = STATE.GAME_OVER;
                    localStorage.setItem('kafatopu_hs', Math.max(playerScore, parseInt(localStorage.getItem('kafatopu_hs') || '0')));
                }
            }
            return;
        }

        // Ball - player head collision
        const px2 = player.x + player.w/2;
        const py2 = player.y + 15; // head area
        const dx = ball.x - px2;
        const dy = ball.y - py2;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < ball.r + 22) {
            const angle = Math.atan2(dy, dx);
            const speed = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
            const boost = Math.max(speed, 7);
            ball.vx = Math.cos(angle) * boost;
            ball.vy = Math.sin(angle) * boost - 3;
            if (ball.vy > 0) ball.vy = -ball.vy;
            // Push ball away from player
            const overlap = ball.r + 22 - dist;
            ball.x += Math.cos(angle) * overlap;
            ball.y += Math.sin(angle) * overlap;
            player.headBouncing = true;
            player.headBounceTimer = 8;
            playSound(440, 'sine', 0.15, 0.3);
        }

        // Ball - opponent head collision
        const ox = opponent.x + opponent.w/2;
        const oy = opponent.y + 15;
        const dx2 = ball.x - ox;
        const dy2 = ball.y - oy;
        const dist2 = Math.sqrt(dx2*dx2 + dy2*dy2);
        if (dist2 < ball.r + 22) {
            const angle = Math.atan2(dy2, dx2);
            const speed = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
            const boost = Math.max(speed, 7);
            ball.vx = Math.cos(angle) * boost;
            ball.vy = Math.sin(angle) * boost - 3;
            if (ball.vy > 0) ball.vy = -ball.vy;
            const overlap = ball.r + 22 - dist2;
            ball.x += Math.cos(angle) * overlap;
            ball.y += Math.sin(angle) * overlap;
            opponent.headBouncing = true;
            opponent.headBounceTimer = 8;
            playSound(330, 'sine', 0.15, 0.3);
        }

        // Timers
        if (player.headBounceTimer > 0) player.headBounceTimer--;
        else player.headBouncing = false;
        if (opponent.headBounceTimer > 0) opponent.headBounceTimer--;
        else opponent.headBouncing = false;

        // Clamp ball speed
        const maxSpd = 18;
        const bspd = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
        if (bspd > maxSpd) {
            ball.vx = ball.vx/bspd*maxSpd;
            ball.vy = ball.vy/bspd*maxSpd;
        }
    }

    function drawPlayer(p, isPlayer) {
        const cx = p.x + p.w/2;
        const cy = p.y;
        const facing = p.facing;
        const bouncing = p.headBouncing;

        // Body
        ctx.fillStyle = isPlayer ? '#3498db' : '#e74c3c';
        ctx.fillRect(p.x + 10, p.y + 30, p.w - 20, p.h - 30);

        // Legs
        ctx.fillStyle = isPlayer ? '#2980b9' : '#c0392b';
        if (p.onGround) {
            ctx.fillRect(p.x + 10, p.y + p.h - 15, 12, 15);
            ctx.fillRect(p.x + p.w - 22, p.y + p.h - 15, 12, 15);
        } else {
            ctx.fillRect(p.x + 8, p.y + p.h - 15, 12, 20);
            ctx.fillRect(p.x + p.w - 20, p.y + p.h - 15, 12, 20);
        }

        // Arms
        ctx.fillStyle = isPlayer ? '#3498db' : '#e74c3c';
        ctx.fillRect(p.x, p.y + 32, 12, 20);
        ctx.fillRect(p.x + p.w - 12, p.y + 32, 12, 20);

        // Head
        ctx.fillStyle = isPlayer ? '#f39c12' : '#f39c12';
        ctx.beginPath();
        ctx.arc(cx, p.y + 18, bouncing ? 22 : 20, 0, Math.PI*2);
        ctx.fill();

        // Hair
        ctx.fillStyle = isPlayer ? '#2c3e50' : '#8e44ad';
        ctx.beginPath();
        ctx.arc(cx, p.y + 6, 15, Math.PI, 0);
        ctx.fill();
        if (isPlayer) {
            // Spiky hair
            ctx.fillStyle = '#2c3e50';
            for (let i = 0; i < 4; i++) {
                ctx.beginPath();
                ctx.moveTo(cx - 12 + i*8, p.y + 6);
                ctx.lineTo(cx - 8 + i*8, p.y - 6);
                ctx.lineTo(cx - 4 + i*8, p.y + 6);
                ctx.fill();
            }
        } else {
            // Round hair
            ctx.fillStyle = '#8e44ad';
            ctx.beginPath();
            ctx.arc(cx, p.y + 3, 17, Math.PI, 0);
            ctx.fill();
        }

        // Eyes
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(cx + facing*6, p.y + 16, 5, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(cx + facing*7, p.y + 16, 2.5, 0, Math.PI*2);
        ctx.fill();

        // Mouth
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;
        ctx.beginPath();
        if (bouncing) {
            ctx.arc(cx + facing*4, p.y + 24, 4, 0, Math.PI);
        } else {
            ctx.moveTo(cx + facing*2, p.y + 24);
            ctx.lineTo(cx + facing*8, p.y + 24);
        }
        ctx.stroke();

        // Jersey number
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(isPlayer ? '10' : '1', cx, p.y + 50);
    }

    function drawBall() {
        ctx.save();
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
        ctx.fillStyle = '#fff';
        ctx.fill();
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Ball pattern
        ctx.strokeStyle = '#555';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.r * 0.6, 0, Math.PI*2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(ball.x - ball.r, ball.y);
        ctx.lineTo(ball.x + ball.r, ball.y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(ball.x, ball.y - ball.r);
        ctx.lineTo(ball.x, ball.y + ball.r);
        ctx.stroke();
        ctx.restore();
    }

    function drawGround() {
        const groundY = H - GROUND_H;
        // Grass
        ctx.fillStyle = '#27ae60';
        ctx.fillRect(0, groundY, W, 12);
        // Dirt
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(0, groundY + 12, W, GROUND_H - 12);

        // Lines
        ctx.strokeStyle = '#2ecc71';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, groundY);
        ctx.lineTo(W, groundY);
        ctx.stroke();

        // Left goal area line
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(W * 0.05, groundY);
        ctx.lineTo(W * 0.05, groundY - 60);
        ctx.lineTo(W * 0.15, groundY - 60);
        ctx.lineTo(W * 0.15, groundY);
        ctx.stroke();

        // Right goal area line
        ctx.beginPath();
        ctx.moveTo(W * 0.95, groundY);
        ctx.lineTo(W * 0.95, groundY - 60);
        ctx.lineTo(W * 0.85, groundY - 60);
        ctx.lineTo(W * 0.85, groundY);
        ctx.stroke();
    }

    function drawNet() {
        const groundY = H - GROUND_H;
        const netTop = groundY - net.h;

        ctx.fillStyle = '#e0e0e0';
        ctx.fillRect(net.x - net.w/2, netTop, net.w, net.h);

        // Net pattern
        ctx.strokeStyle = '#bbb';
        ctx.lineWidth = 1;
        for (let y = netTop; y < groundY; y += 12) {
            ctx.beginPath();
            ctx.moveTo(net.x - net.w/2, y);
            ctx.lineTo(net.x + net.w/2, y);
            ctx.stroke();
        }
    }

    function drawBackground() {
        // Sky gradient
        const grad = ctx.createLinearGradient(0, 0, 0, H - GROUND_H);
        grad.addColorStop(0, '#87CEEB');
        grad.addColorStop(1, '#E0F0FF');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H - GROUND_H);

        // Clouds
        drawCloud(W * 0.15, H * 0.1, 50);
        drawCloud(W * 0.5, H * 0.07, 40);
        drawCloud(W * 0.8, H * 0.12, 55);

        // Sun
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.arc(W * 0.9, H * 0.08, 30, 0, Math.PI*2);
        ctx.fill();
    }

    function drawCloud(x, y, r) {
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI*2);
        ctx.arc(x + r*0.8, y - r*0.3, r*0.7, 0, Math.PI*2);
        ctx.arc(x + r*1.5, y, r*0.8, 0, Math.PI*2);
        ctx.fill();
    }

    function drawHUD() {
        // Score board
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        const bw = 200, bh = 60;
        roundRect(W/2 - bw/2, 10, bw, bh, 10);
        ctx.fill();

        ctx.fillStyle = '#3498db';
        ctx.font = 'bold 32px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(playerScore, W/2 - 40, 52);

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 20px Arial';
        ctx.fillText('-', W/2, 52);

        ctx.fillStyle = '#e74c3c';
        ctx.font = 'bold 32px Arial';
        ctx.fillText(opponentScore, W/2 + 40, 52);

        // Win condition text
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.font = '11px Arial';
        ctx.fillText('First to 7 wins!', W/2, 80);

        // Player labels
        ctx.fillStyle = '#3498db';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'left';
        ctx.fillText('YOU', 15, 30);

        ctx.fillStyle = '#e74c3c';
        ctx.textAlign = 'right';
        ctx.fillText('BOT', W - 15, 30);

        // High score
        ctx.fillStyle = 'rgba(255,215,0,0.9)';
        ctx.font = '12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('🏆 High Score: ' + highScore, W/2, 100);
    }

    function roundRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x+r, y);
        ctx.lineTo(x+w-r, y);
        ctx.quadraticCurveTo(x+w, y, x+w, y+r);
        ctx.lineTo(x+w, y+h-r);
        ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
        ctx.lineTo(x+r, y+h);
        ctx.quadraticCurveTo(x, y+h, x, y+h-r);
        ctx.lineTo(x, y+r);
        ctx.quadraticCurveTo(x, y, x+r, y);
        ctx.closePath();
    }

    function drawButtons() {
        // Left button
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        roundRect(leftBtn.x, leftBtn.y, leftBtn.w, leftBtn.h, 12);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 2;
        roundRect(leftBtn.x, leftBtn.y, leftBtn.w, leftBtn.h, 12);
        ctx.stroke();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 30px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('◀', leftBtn.x + leftBtn.w/2, leftBtn.y + leftBtn.h/2 + 10);

        // Right button
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        roundRect(rightBtn.x, rightBtn.y, rightBtn.w, rightBtn.h, 12);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        roundRect(rightBtn.x, rightBtn.y, rightBtn.w, rightBtn.h, 12);
        ctx.stroke();
        ctx.fillStyle = '#fff';
        ctx.fillText('▶', rightBtn.x + rightBtn.w/2, rightBtn.y + rightBtn.h/2 + 10);

        // Jump button
        ctx.fillStyle = 'rgba(255,220,0,0.35)';
        roundRect(jumpBtn.x, jumpBtn.y, jumpBtn.w, jumpBtn.h, 12);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,220,0,0.7)';
        roundRect(jumpBtn.x, jumpBtn.y, jumpBtn.w, jumpBtn.h, 12);
        ctx.stroke();
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 14px Arial';
        ctx.fillText('JUMP', jumpBtn.x + jumpBtn.w/2, jumpBtn.y + jumpBtn.h/2 + 6);
    }

    function drawMenu() {
        drawBackground();
        drawGround();

        // Title panel
        ctx.fillStyle = 'rgba(0,0,30,0.75)';
        roundRect(W/2 - 200, H/2 - 160, 400, 320, 20);
        ctx.fill();
        ctx.strokeStyle = '#f39c12';
        ctx.lineWidth = 3;
        roundRect(W/2 - 200, H/2 - 160, 400, 320, 20);
        ctx.stroke();

        // Title
        ctx.fillStyle = '#f39c12';
        ctx.font = 'bold 52px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('⚽ HEAD BALL', W/2, H/2 - 90);

        ctx.fillStyle = '#fff';
        ctx.font = '20px Arial';
        ctx.fillText('First to 7 points wins!', W/2, H/2 - 50);

        ctx.font = '16px Arial';
        ctx.fillStyle = '#aef';
        ctx.fillText('← → Move   JUMP: Jump', W/2, H/2);
        ctx.fillText('Hit the ball with your head!', W/2, H/2 + 30);

        // High score
        if (highScore > 0) {
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 18px Arial';
            ctx.fillText('🏆 High Score: ' + highScore, W/2, H/2 + 70);
        }

        // Tap to start
        const pulse = Math.sin(Date.now() * 0.004) * 0.3 + 0.7;
        ctx.fillStyle = 'rgba(243,156,18,' + pulse + ')';
        ctx.font = 'bold 26px Arial';
        ctx.fillText('Tap to start!', W/2, H/2 + 120);
    }

    function drawGameOver() {
        drawBackground();
        drawGround();
        drawNet();

        const won = playerScore >= 7;

        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        roundRect(W/2 - 200, H/2 - 180, 400, 360, 20);
        ctx.fill();
        ctx.strokeStyle = won ? '#2ecc71' : '#e74c3c';
        ctx.lineWidth = 3;
        roundRect(W/2 - 200, H/2 - 180, 400, 360, 20);
        ctx.stroke();

        ctx.textAlign = 'center';

        if (won) {
            ctx.fillStyle = '#2ecc71';
            ctx.font = 'bold 48px Arial';
            ctx.fillText('🏆 YOU WIN!', W/2, H/2 - 110);
        } else {
            ctx.fillStyle = '#e74c3c';
            ctx.font = 'bold 48px Arial';
            ctx.fillText('😢 YOU LOST!', W/2, H/2 - 110);
        }

        ctx.fillStyle = '#fff';
        ctx.font = '24px Arial';
        ctx.fillText('Score: ' + playerScore + ' - ' + opponentScore, W/2, H/2 - 55);

        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 20px Arial';
        ctx.fillText('🏆 High Score: ' + highScore, W/2, H/2 - 15);

        ctx.fillStyle = '#aef';
        ctx.font = '18px Arial';
        ctx.fillText(won ? 'Amazing performance!' : 'You can do better!', W/2, H/2 + 30);

        const pulse = Math.sin(Date.now() * 0.005) * 0.3 + 0.7;
        ctx.fillStyle = 'rgba(243,156,18,' + pulse + ')';
        ctx.font = 'bold 26px Arial';
        ctx.fillText('Tap to play again!', W/2, H/2 + 110);
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);

        if (state === STATE.MENU) {
            drawMenu();
            return;
        }

        if (state === STATE.GAME_OVER) {
            drawGameOver();
            return;
        }

        // Draw game
        drawBackground();
        drawGround();
        drawNet();
        drawPlayer(player, true);
        drawPlayer(opponent, false);
        drawBall();
        drawHUD();
        drawButtons();
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    function startGame() {
        playerScore = 0;
        opponentScore = 0;
        highScore = parseInt(localStorage.getItem('kafatopu_hs') || '0');
        initPositions();
        resetBall('left');
        state = STATE.PLAYING;
    }

    function handleJump() {
        if (player.onGround) {
            player.vy = -14;
            player.onGround = false;
            player.jumpCount = 1;
            playSound(300, 'sine', 0.15, 0.25);
        }
    }

    // Touch handling
    let activeTouches = {};

    function getTouchBtn(x, y) {
        if (x >= leftBtn.x && x <= leftBtn.x + leftBtn.w && y >= leftBtn.y && y <= leftBtn.y + leftBtn.h) return 'left';
        if (x >= rightBtn.x && x <= rightBtn.x + rightBtn.w && y >= rightBtn.y && y <= rightBtn.y + rightBtn.h) return 'right';
        if (x >= jumpBtn.x && x <= jumpBtn.x + jumpBtn.w && y >= jumpBtn.y && y <= jumpBtn.y + jumpBtn.h) return 'jump';
        return null;
    }

    function updateTouchState() {
        touchLeft = false;
        touchRight = false;
        for (let id in activeTouches) {
            const btn = activeTouches[id];
            if (btn === 'left') touchLeft = true;
            if (btn === 'right') touchRight = true;
        }
    }

    canvas.addEventListener('touchstart', function(e) {
        e.preventDefault();
        initAudio();
        for (let i = 0; i < e.changedTouches.length; i++) {
            const t = e.changedTouches[i];
            const x = t.clientX;
            const y = t.clientY;
            if (state === STATE.MENU) {
                startGame();
                return;
            }
            if (state === STATE.GAME_OVER) {
                startGame();
                return;
            }
            const btn = getTouchBtn(x, y);
            if (btn === 'jump') {
                handleJump();
            } else if (btn) {
                activeTouches[t.identifier] = btn;
            }
        }
        updateTouchState();
    }, {passive: false});

    canvas.addEventListener('touchmove', function(e) {
        e.preventDefault();
        for (let i = 0; i < e.changedTouches.length; i++) {
            const t = e.changedTouches[i];
            const btn = getTouchBtn(t.clientX, t.clientY);
            if (btn && btn !== 'jump') {
                activeTouches[t.identifier] = btn;
            } else if (btn !== 'jump') {
                delete activeTouches[t.identifier];
            }
        }
        updateTouchState();
    }, {passive: false});

    canvas.addEventListener('touchend', function(e) {
        e.preventDefault();
        for (let i = 0; i < e.changedTouches.length; i++) {
            const t = e.changedTouches[i];
            delete activeTouches[t.identifier];
        }
        updateTouchState();
    }, {passive: false});

    // Mouse/keyboard handling
    canvas.addEventListener('mousedown', function(e) {
        initAudio();
        const x = e.clientX;
        const y = e.clientY;
        if (state === STATE.MENU) { startGame(); return; }
        if (state === STATE.GAME_OVER) { startGame(); return; }
        const btn = getTouchBtn(x, y);
        if (btn === 'jump') handleJump();
        if (btn === 'left') touchLeft = true;
        if (btn === 'right') touchRight = true;
    });

    canvas.addEventListener('mouseup', function(e) {
        touchLeft = false;
        touchRight = false;
    });

    window.addEventListener('keydown', function(e) {
        initAudio();
        if (state === STATE.MENU || state === STATE.GAME_OVER) {
            if (e.code === 'Space' || e.code === 'Enter') { startGame(); return; }
        }
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
        if ((e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') && state === STATE.PLAYING) {
            e.preventDefault();
            handleJump();
        }
    });

    window.addEventListener('keyup', function(e) {
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
    });

    // Start
    gameLoop();
</script>
</body>
</html>
